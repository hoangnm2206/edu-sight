name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: Production build
        run: npm run build
        env:
          # Build doesn't actually need real values; these are read at runtime.
          # Provide stubs so any compile-time refs don't break.
          LIVEKIT_API_KEY: stub
          LIVEKIT_API_SECRET: stub
          NEXT_PUBLIC_LIVEKIT_URL: wss://stub.livekit.cloud
